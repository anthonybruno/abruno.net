<div x-data="{cool: dataObj}" x-init="cool = await getCool()">
  <h2 class="pb-8">Currently</h2>
  <ul class="space-y-6">
    <li>
      <a
        class="group"
        href="https://duckduckgo.com/?q=denver+colorado&atb=v338-1&ia=web&iax=about&iaxm=maps"
      >
        <h6 class="transition-color group-hover:text-blue-500">Denver, CO</h6>
        <span class="dimmed-text inline-block text-pretty">
          where it&rsquo;s about <span x-text="cool.temp"></span> degrees around
          <span x-text="currentTime()"></span>
        </span>
      </a>
    </li>
    <li>
      <a class="group" x-bind:href="cool.link">
        <h6 class="transition-color group-hover:text-blue-500">
          <span x-text="cool.trackArtist"></span>
        </h6>
        <span class="dimmed-text inline-block">
          on Spotify <span x-text="cool.lastUpdatedDistance"></span>
        </span>
      </a>
    </li>
  </ul>
</div>

<script>
  async function getCool() {
    const response = await fetch("https://coolapi.live");
    const data = await response.json();
    Alpine.store("loaded", true);
    return data;
  }

  function currentTime() {
    return new Date().toLocaleString("en-US", {
      hour: "numeric",
      minute: "numeric",
      timeZone: "US/Mountain",
    });
  }

  function dataObj() {
    return {
      trackArtist: null,
      link: null,
      lastUpdatedDistance: null,
      temp: null,
    };
  }
</script>
